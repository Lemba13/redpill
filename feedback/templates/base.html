<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}RedPill Feedback{% endblock %}</title>
    <style>
        /* --- Reset & base --- */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #ffffff;
            --bg-card: #f8f9fa;
            --bg-hover: #f0f1f3;
            --text-primary: #1a1a1a;
            --text-secondary: #5a5a5a;
            --text-muted: #8a8a8a;
            --border: #e2e4e8;
            --accent: #4f46e5;
            --accent-light: #eef2ff;
            --green: #16a34a;
            --green-light: #f0fdf4;
            --green-border: #bbf7d0;
            --red: #dc2626;
            --red-light: #fef2f2;
            --red-border: #fecaca;
            --radius: 8px;
            --radius-lg: 12px;
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f0f0f;
                --bg-card: #1a1a1a;
                --bg-hover: #252525;
                --text-primary: #e5e5e5;
                --text-secondary: #a0a0a0;
                --text-muted: #666666;
                --border: #2a2a2a;
                --accent: #818cf8;
                --accent-light: #1e1b4b;
                --green-light: #052e16;
                --green-border: #14532d;
                --red-light: #450a0a;
                --red-border: #7f1d1d;
                --shadow: 0 1px 3px rgba(0,0,0,0.3);
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 24px 16px;
        }

        /* --- Header --- */
        .header {
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .header .subtitle {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* --- Digest item card --- */
        .item-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
            transition: border-color 0.15s ease;
        }

        .item-card.voted-up {
            border-color: var(--green-border);
            background: var(--green-light);
        }

        .item-card.voted-down {
            border-color: var(--red-border);
            background: var(--red-light);
        }

        .item-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .item-domain {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .item-summary {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            line-height: 1.5;
        }

        .item-insight {
            font-size: 13px;
            color: var(--accent);
            font-style: italic;
            margin-bottom: 14px;
        }

        .item-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        /* --- Vote buttons --- */
        .vote-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.15s ease;
            -webkit-tap-highlight-color: transparent;  /* clean tap on mobile */
            user-select: none;
            min-height: 44px;   /* Apple HIG minimum touch target */
            min-width: 44px;
        }

        .vote-btn:hover {
            background: var(--bg-hover);
            border-color: var(--text-muted);
        }

        .vote-btn:active {
            transform: scale(0.97);
        }

        .vote-btn.active-up {
            background: var(--green-light);
            border-color: var(--green);
            color: var(--green);
        }

        .vote-btn.active-down {
            background: var(--red-light);
            border-color: var(--red);
            color: var(--red);
        }

        .vote-btn.disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .source-link {
            font-size: 13px;
            color: var(--accent);
            text-decoration: none;
            margin-left: auto;
        }

        .source-link:hover {
            text-decoration: underline;
        }

        /* --- Bookmark button --- */
        .bookmark-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px 10px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text-muted);
            font-size: 15px;
            cursor: pointer;
            transition: all 0.15s ease;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            min-height: 44px;
            min-width: 44px;
            margin-left: 8px;
        }

        .bookmark-btn:hover {
            background: var(--bg-hover);
            border-color: var(--text-muted);
        }

        .bookmark-btn:active {
            transform: scale(0.97);
        }

        .bookmark-btn.bookmarked {
            color: #f59e0b;
            border-color: #f59e0b;
            background: #fffbeb;
        }

        @media (prefers-color-scheme: dark) {
            .bookmark-btn.bookmarked {
                background: #1c1500;
                border-color: #f59e0b;
            }
        }

        /* compact bookmark button for history rows */
        .bookmark-btn-sm {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 2px 5px;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s ease;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            flex-shrink: 0;
            line-height: 1;
        }

        .bookmark-btn-sm:hover {
            border-color: var(--text-muted);
        }

        .bookmark-btn-sm.bookmarked {
            color: #f59e0b;
            border-color: #f59e0b;
        }

        /* --- Digest list (index page) --- */
        .digest-link {
            display: block;
            padding: 14px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 8px;
            text-decoration: none;
            color: var(--text-primary);
            font-size: 15px;
            transition: background 0.15s ease;
        }

        .digest-link:hover {
            background: var(--bg-hover);
        }

        .digest-link .date {
            font-weight: 600;
        }

        .digest-link .meta {
            font-size: 13px;
            color: var(--text-muted);
        }

        /* --- History page --- */
        .back-link {
            font-size: 13px;
            color: var(--accent);
            text-decoration: none;
            display: inline-block;
            margin-top: 6px;
        }
        .back-link:hover { text-decoration: underline; }

        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            margin-bottom: 16px;
        }

        .filter-bar input,
        .filter-bar select {
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 6px 10px;
            font-size: 14px;
            background: var(--bg-card);
            color: var(--text-primary);
            height: 34px;
        }

        .filter-bar input:focus,
        .filter-bar select:focus {
            outline: 2px solid var(--accent);
            outline-offset: -1px;
        }

        .filter-bar input[name="q"] { flex: 1 1 180px; }
        .filter-bar input[type="date"] { flex: 0 0 140px; }
        .filter-bar select,
        .filter-bar input[name="domain"] { flex: 0 1 160px; }

        .filter-bar .filter-submit {
            padding: 6px 16px;
            height: 34px;
            border-radius: var(--radius);
            border: 1px solid var(--accent);
            background: var(--accent);
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }

        .filter-bar .filter-submit:hover { opacity: 0.9; }

        .filter-clear {
            font-size: 13px;
            color: var(--text-muted);
            text-decoration: none;
            white-space: nowrap;
        }
        .filter-clear:hover { color: var(--text-secondary); text-decoration: underline; }

        .results-summary {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .history-date-group { margin-bottom: 24px; }

        .history-date-header {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 4px;
        }

        .history-row {
            display: flex;
            align-items: baseline;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }
        .history-row:last-child { border-bottom: none; }

        .vote-badge {
            font-size: 13px;
            font-weight: 600;
            min-width: 18px;
            text-align: center;
            flex-shrink: 0;
        }
        .vote-badge.up  { color: var(--green); }
        .vote-badge.down { color: var(--red); }

        .score-badge {
            font-size: 11px;
            color: var(--text-muted);
            flex-shrink: 0;
            font-variant-numeric: tabular-nums;
            min-width: 26px;
            text-align: right;
        }

        .history-body { flex: 1; min-width: 0; }

        .history-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            text-decoration: none;
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .history-title:hover { text-decoration: underline; }

        .history-insight {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-domain {
            font-size: 11px;
            color: var(--text-muted);
        }

        .history-source {
            font-size: 12px;
            color: var(--accent);
            text-decoration: none;
            flex-shrink: 0;
            white-space: nowrap;
        }
        .history-source:hover { text-decoration: underline; }

        .pagination {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 32px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
            font-size: 14px;
        }
        .pagination a { color: var(--accent); text-decoration: none; }
        .pagination a:hover { text-decoration: underline; }
        .pagination .page-label { color: var(--text-muted); }

        /* --- Responsive --- */
        @media (max-width: 480px) {
            .container { padding: 16px 12px; }
            .item-card { padding: 16px; }
            .item-actions { gap: 6px; }
            .vote-btn { padding: 10px 14px; flex: 1; justify-content: center; }
            .source-link { margin-left: 0; margin-top: 8px; flex-basis: 100%; text-align: center; }
            .filter-bar { flex-direction: column; }
            .filter-bar input,
            .filter-bar select,
            .filter-bar input[type="date"],
            .filter-bar input[name="domain"] { width: 100%; flex: none; }
            .history-source { display: none; }
        }
    </style>
</head>
<body>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    {% block scripts %}{% endblock %}
</body>
</html>
