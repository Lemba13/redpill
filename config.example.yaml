# RedPill configuration — copy to config.yaml and edit

topic: "contrastive learning"

# Static queries — used when query_planning.enabled is false (the default).
# Once you have a few runs of term history, enable the planner below instead.
search_queries:
  - "contrastive learning 2026"
  - "contrastive learning new paper"
  - "contrastive learning breakthrough"

max_results_per_query: 10

# Search provider: "tavily" | "serper" | "both"
# "both" fans out every query to both providers and merges results for broader coverage.
# Requires SERPER_API_KEY in .env when set to "serper" or "both".
search_provider: "both"

dedup_similarity_threshold: 0.85

# Option A: explicit path (default)
db_path: "data/redpill.db"

# Option B: directory only — file is named redpill_<topic_slug>.db automatically.
# Useful when running multiple topics. If both are set, db_path wins.
# db_dir: "data"

# "markdown" writes to data/digests/YYYY-MM-DD.md
# "email"    sends via SMTP (requires email_config below)
delivery_method: "markdown"

# Summarization + term extraction model (used on every article).
ollama_config:
  base_url: "http://localhost:11434"
  model: "llama3.1:8b"  # e.g. "qwen3:4b", "mistral"

embedding_model: "all-MiniLM-L6-v2"

# Query planning — uses term history from prior runs to generate targeted queries.
# Set enabled: true after a few runs have built up term history.
# When enabled, search_queries above is ignored.
#
# Two modes are supported:
#   - Two-stage (recommended): set planner_llm.model to a reasoning model.
#     The planner decomposes the topic into research dimensions, then
#     synthesizes queries from the plan. Requires a model that supports
#     think=true (e.g. qwen3.5:4b — pull with: ollama pull qwen3.5:4b).
#   - Single-stage (simpler): set planner_llm.model to the same model as
#     ollama_config.model. The LLM is prompted for query strings directly.
query_planning:
  enabled: false        # set to true once term history has been built up
  max_queries: 5        # total queries per run including base topic
  max_dimensions: 6     # max subtopics in the two-stage research plan
  ucb_alpha: 1.0                 # UCB exploration constant
  saturation_decay_days: 7       # half-life of saturation penalty (days)
  saturation_penalty_weight: 0.3 # max saturation penalty magnitude
  promotion_k: 3                 # consecutive successes for explore→exploit
  mmr_lambda_floor: 0.3          # minimum lambda for MMR diversity filter

# Research planner model — called once per run for topic decomposition.
# Uses a reasoning model (think: true) when available for best results.
# Set model to the same as ollama_config.model for a simpler single-stage path.
#
# Required model: ollama pull qwen3.5:4b
# (or substitute any model that supports think: true)
planner_llm:
  base_url: "http://localhost:11434"
  model: "qwen3.5:4b"   # reasoning model; supports think: true
  think: true           # enable extended chain-of-thought reasoning
  timeout: 120          # seconds — reasoning models can be slow on first call

# Required only if delivery_method is "email"
email_config:
  smtp_host: "smtp.example.com"
  smtp_port: 587
  sender: "redpill@example.com"
  recipient: "you@example.com"

# Feedback service configuration.
# When enabled: true, the pipeline writes JSON sidecars to data/digests/ and
# embeds feedback links in email deliveries.
# Run the feedback service with: redpill-feedback
# No API keys required — it is a local service.
feedback:
  enabled: false
  base_url: "http://localhost:8080"    # URL for feedback links in emails
  port: 8080                           # port for the feedback service
  db_path: "data/feedback.db"          # feedback database location
  min_votes_for_signals: 5             # minimum votes before feedback affects planning
  signal_lookback_days: 30             # how many days of feedback to consider
